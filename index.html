<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <title>PureMark</title>
    <script>
      // 在 DOM 渲染前立即应用主题背景色，避免启动时闪白/闪黑
      ;(function () {
        var theme = localStorage.getItem('theme-name') || 'normal'
        var bgMap = {
          normal: '#ffffff',
          'normal-dark': '#3b4252',
          crepe: '#fafbfc',
          'crepe-dark': '#161b22',
          frame: '#fbfbf2',
          'frame-dark': '#383838',
        }
        var bg = bgMap[theme]
        if (!bg) {
          try {
            var customs = JSON.parse(localStorage.getItem('custom-themes') || '[]')
            for (var i = 0; i < customs.length; i++) {
              if (customs[i].name === theme && customs[i].data && customs[i].data.appCssProperties) {
                bg = customs[i].data.appCssProperties['--background-color-1']
                break
              }
            }
          } catch (e) {}
        }
        var primaryMap = {
          normal: '#5e81ac',
          'normal-dark': '#88c0d0',
          crepe: '#0366d6',
          'crepe-dark': '#58a6ff',
          frame: '#4d8077',
          'frame-dark': '#e3a76f',
        }
        var primary = primaryMap[theme]
        if (!primary) {
          try {
            var c = customs || JSON.parse(localStorage.getItem('custom-themes') || '[]')
            for (var j = 0; j < c.length; j++) {
              if (c[j].name === theme && c[j].data && c[j].data.appCssProperties) {
                primary = c[j].data.appCssProperties['--primary-color']
                break
              }
            }
          } catch (e) {}
        }
        document.documentElement.style.background = bg || '#ffffff'
        document.documentElement.style.setProperty('--primary-color', primary || '#5e81ac')
        document.documentElement.classList.add('theme-' + theme)
      })()
    </script>
  </head>
  <style>
    .welcome {
      width: calc(100vw - 36px);
      height: calc(100vh - 36px);
    }
    .welcome > img {
      width: 31%;
      height: 31%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: block;
      object-fit: contain;
    }
  </style>
  <body>
    <div id="app">
      <div class="welcome">
        <img src="./logo.svg" alt="PureMark Logo" />
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
