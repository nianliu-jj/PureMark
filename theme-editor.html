<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>主题编辑器页面 - PureMark</title>
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <script>
      (function () {
        var theme = localStorage.getItem("theme-name") || "normal";
        var bgMap = {
          normal: "#ffffff",
          "normal-dark": "#3b4252",
          crepe: "#fafbfc",
          "crepe-dark": "#161b22",
          frame: "#fbfbf2",
          "frame-dark": "#383838",
        };
        var bg = bgMap[theme];
        if (!bg) {
          try {
            var customs = JSON.parse(localStorage.getItem("custom-themes") || "[]");
            for (var i = 0; i < customs.length; i++) {
              if (
                customs[i].name === theme &&
                customs[i].data &&
                customs[i].data.appCssProperties
              ) {
                bg = customs[i].data.appCssProperties["--background-color-1"];
                break;
              }
            }
          } catch (e) {}
        }
        document.documentElement.classList.add("theme-" + theme);
        var teRoot = document.getElementById("theme-editor-app");
        if (teRoot) teRoot.style.background = bg || "#ffffff";
      })();
    </script>
  </head>
  <body>
    <div id="theme-editor-app"></div>
    <script type="module" src="/src/theme-editor-main.ts"></script>
  </body>
</html>
